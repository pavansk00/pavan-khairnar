- name: Create or Update Glue Job
        run: |
          set -e
          echo "Checking if job exists: $GLUE_JOB_NAME"
          if aws glue get-job --job-name "$GLUE_JOB_NAME" --region "$AWS_REGION" > /dev/null 2>&1; then
            echo "Job exists. Updating..."
            aws glue update-job \
              --job-name "$GLUE_JOB_NAME" \
              --job-update file://glue/jobs/dq_job.json \
              --region "$AWS_REGION"
          else
            echo "Job not found. Creating..."
            aws glue create-job \
              --name "$GLUE_JOB_NAME" \
              --cli-input-json file://glue/jobs/dq_job.json \
              --region "$AWS_REGION"
          fi