name: Deploy Glue DQ Job (Create/Update)

on:
  push:
    branches:
      - main
    paths:
      - "glue/job/dq_job.json"
      - ".github/workflows/deploy-glue-dq-job.yml"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-2
  GLUE_JOB_NAME: glue-dq-account

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::756118984406:role/Role-GitHubActions-Deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity (debug)
        run: aws sts get-caller-identity

      - name: Debug - list glue folder
        run: |
          echo "Listing glue folder structure:"
          ls -R glue || true
          echo "Listing glue/job folder:"
          ls -la glue/job || true

      - name: Validate dq_job.json exists in repo
        run: |
          test -f glue/job/dq_job.json || (echo "ERROR: glue/job/dq_job.json not found in repo" && exit 1)

      - name: Create or Update Glue Job from dq_job.json
        run: |
          set -e
          JOB_NAME="${{ env.GLUE_JOB_NAME }}"
          REGION="${{ env.AWS_REGION }}"

          echo "Checking if Glue job exists: $JOB_NAME"
          if aws glue get-job --job-name "$JOB_NAME" --region "$REGION" > /dev/null 2>&1; then
            echo "Job exists. Updating..."

            # update-job expects a JobUpdate object (no top-level Name).
            # So we remove "Name" from dq_job.json and write a temp update file.
            python -c "import json; d=json.load(open('glue/job/dq_job.json')); d.pop('Name', None); json.dump(d, open('/tmp/dq_job_update.json','w'))"

            aws glue update-job \
              --job-name "$JOB_NAME" \
              --job-update file:///tmp/dq_job_update.json \
              --region "$REGION"

            echo "Update completed."
          else
            echo "Job not found. Creating..."

            aws glue create-job \
              --cli-input-json file://glue/job/dq_job.json \
              --region "$REGION"

            echo "Create completed."
          fi