name: Deploy Lambda - Parse Filename

on:
  push:
    branches:
      - main
    paths:
      - "lambda/parse_filename/**"
      - ".github/workflows/deploy-lambda.yml"

  workflow_dispatch: {}

permissions:
  id-token: write   # REQUIRED for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Debug: confirm which repo + branch is triggering
      - name: Show GitHub context (debug)
        run: |
          echo "GITHUB_REPOSITORY=$GITHUB_REPOSITORY"
          echo "GITHUB_REF=$GITHUB_REF"
          echo "GITHUB_REF_NAME=$GITHUB_REF_NAME"
          echo "GITHUB_SHA=$GITHUB_SHA"
          echo "GITHUB_EVENT_NAME=$GITHUB_EVENT_NAME"

      # Debug: show folders so you can confirm the path exists
      - name: List repo files (debug)
        run: |
          echo "Top level:"
          ls -la
          echo "lambda folder:"
          ls -la lambda || true
          echo "lambda/parse_filename folder:"
          ls -la lambda/parse_filename || true

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::756118984406:role/Role-GitHubActions-Deploy
          aws-region: ap-southeast-2

      # Debug: confirms role assumption worked
      - name: Verify AWS identity (debug)
        run: aws sts get-caller-identity

      # Fail fast if file isn't present
      - name: Validate Lambda source exists
        run: |
          test -f lambda/parse_filename/lambda_function.py || (echo "ERROR: lambda/parse_filename/lambda_function.py not found" && exit 1)

      - name: Create Lambda zip
        working-directory: lambda/parse_filename
        run: |
          rm -f function.zip
          zip -r function.zip lambda_function.py
          ls -lh function.zip

      - name: Deploy Lambda code
        run: |
          aws lambda update-function-code \
            --function-name lambda-parse-account-filename \
            --zip-file fileb://lambda/parse_filename/function.zip \
            --region ap-southeast-2