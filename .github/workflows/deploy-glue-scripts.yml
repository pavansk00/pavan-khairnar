name: Deploy Glue Scripts to S3

on:
  push:
    branches:
      - main
    paths:
      - "glue/**"
      - ".github/workflows/deploy-glue-scripts.yml"

  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::756118984406:role/Role-GitHubActions-Deploy
          aws-region: ap-southeast-2

      - name: Verify AWS identity (debug)
        run: aws sts get-caller-identity

      - name: Show glue folder (debug)
        run: |
          echo "Listing glue folder:"
          ls -R glue || true

      - name: Sync Glue scripts to S3 (curated bucket)
        run: |
          aws s3 sync glue/ s3://pavan-account-curated-pkr/glue/ --delete